<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>BELA MINI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <style>
        :root {
            --primary-green: #00ff88;
            --dark-green: #004d2c;
            --glow-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            --glass: rgba(10, 25, 20, 0.85);
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #0a1f16 0%, #000 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Animated Background Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--primary-green);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* Container & Glassmorphism Card */
        .container {
            position: relative;
            width: 90%;
            max-width: 400px;
            z-index: 10;
        }

        .anime-girl-container {
            position: absolute;
            top: -120px;
            right: -20px;
            width: 150px;
            height: 150px;
            z-index: 11;
            filter: drop-shadow(0 0 10px var(--primary-green));
            animation: bounce 3s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .box {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 24px;
            padding: 40px 25px 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), var(--glow-shadow);
            position: relative;
            overflow: hidden;
        }

        .box::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
            animation: shine 4s infinite;
        }

        @keyframes shine {
            to { left: 100%; }
        }

        h3 {
            color: var(--primary-green);
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        h6 {
            color: #a0ffd0;
            margin: 8px 0;
            opacity: 0.8;
            font-weight: 400;
        }

        /* Input Styling */
        .input-container {
            margin-top: 25px;
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 5px;
            border: 1px solid rgba(0, 255, 136, 0.1);
            transition: 0.3s;
        }

        .input-container:focus-within {
            border-color: var(--primary-green);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .input-container input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 12px 15px;
            font-size: 1rem;
            width: 100%;
        }

        .input-container input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .input-container button {
            background: var(--primary-green);
            border: none;
            border-radius: 12px;
            color: #000;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-container button:hover {
            background: #fff;
            transform: scale(1.05);
        }

        .input-container button:active {
            transform: scale(0.95);
        }

        /* Results Display */
        #pair {
            margin-top: 25px;
            min-height: 60px;
            transition: all 0.3s ease;
        }

        .waiting-text {
            color: var(--primary-green);
            animation: pulse 1.5s infinite;
            font-weight: bold;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .code-display {
            background: rgba(0, 255, 136, 0.1);
            border: 2px dashed var(--primary-green);
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            display: inline-block;
            transition: 0.3s;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .code-display:hover {
            background: rgba(0, 255, 136, 0.2);
        }

        .code-label {
            display: block;
            font-size: 0.8rem;
            color: var(--primary-green);
            margin-bottom: 5px;
        }

        .code-value {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: white;
        }

        /* SVG Icon Decoration */
        .icon-circle {
            width: 60px;
            height: 60px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            border: 1px solid var(--primary-green);
        }
    </style>
</head>
<body>

    <div class="particles" id="particle-container"></div>

    <div class="container">
        <!-- Minimal Anime Girl Mascot (SVG) -->
        <div class="anime-girl-container">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="45" r="35" fill="#ffe0bd" />
                <path d="M20,40 Q25,10 50,10 Q75,10 80,40" fill="#00ff88" />
                <path d="M15,45 Q10,30 25,20" fill="#00ff88" />
                <path d="M85,45 Q90,30 75,20" fill="#00ff88" />
                <circle cx="40" cy="45" r="4" fill="#000" />
                <circle cx="60" cy="45" r="4" fill="#000" />
                <path d="M45,55 Q50,60 55,55" stroke="#ff8888" stroke-width="2" fill="none" />
                <rect x="35" y="75" width="30" height="15" rx="5" fill="#00ff88" />
            </svg>
        </div>

        <div class="box">
            <div class="icon-circle">
                <i class="fa fa-bolt" style="color:var(--primary-green); font-size: 24px;"></i>
            </div>
            
            <h3>BELA MINI</h3>
            <h6>GLITCH PHANTOMS • V2.0</h6>
            <h6 style="font-size: 0.85rem; margin-top: 15px;">Enter WhatsApp number with country code</h6>

            <div class="input-container">
                <input placeholder="e.g. 94701234567" type="number" id="number">
                <button id="submit">
                    <i class="fa fa-paper-plane"></i>
                </button>
            </div>

            <div id="pair">
                <!-- Status/Result messages appear here -->
            </div>

            <div style="margin-top: 20px; font-size: 0.7rem; color: rgba(255,255,255,0.3);">
                &copy; 2024 Glitch Phantoms. All Rights Reserved.
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
    <script>
        // Particle Background Generator
        const pContainer = document.getElementById('particle-container');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 5 + 2 + 'px';
            p.style.width = size;
            p.style.height = size;
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 15 + 's';
            p.style.animationDuration = (Math.random() * 10 + 10) + 's';
            pContainer.appendChild(p);
        }

        const displayArea = document.getElementById("pair");
        const submitBtn = document.getElementById("submit");
        const numInput = document.getElementById("number");

        // Copy Function
        async function copyCode(code) {
            try {
                // Compatibility for iframe/various environments
                const tempInput = document.createElement("input");
                tempInput.value = code;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand("copy");
                document.body.removeChild(tempInput);

                const copyEl = document.getElementById("copy-status");
                if(copyEl) {
                    const originalText = copyEl.innerText;
                    copyEl.innerText = "COPIED TO CLIPBOARD!";
                    copyEl.style.color = "#fff";
                    setTimeout(() => {
                        copyEl.innerText = originalText;
                        copyEl.style.color = "var(--primary-green)";
                    }, 2000);
                }
            } catch (err) {
                console.error('Failed to copy: ', err);
            }
        }

        submitBtn.addEventListener("click", async (e) => {
            e.preventDefault();
            
            const rawValue = numInput.value.trim();
            
            if (!rawValue) {
                displayArea.innerHTML = '<span style="color:#ff4444; font-size: 0.9rem;">Please enter a valid number!</span>';
                return;
            }

            const cleanNumber = rawValue.replace(/[^0-9]/g, "");
            
            if (cleanNumber.length < 10) {
                displayArea.innerHTML = '<span style="color:#ff4444; font-size: 0.9rem;">Number is too short!</span>';
                return;
            }

            // Visual updates
            numInput.type = "text";
            numInput.value = "+" + cleanNumber;
            displayArea.innerHTML = '<div class="waiting-text">CONNECTING TO SERVER...</div>';

            try {
                // Requesting the code
                const response = await axios.get(`/code?number=${cleanNumber}`);
                const code = response.data.code || "ERROR";

                if (code === "ERROR") throw new Error("API Error");

                displayArea.innerHTML = `
                    <div class="code-display" onclick="copyCode('${code}')">
                        <span class="code-label" id="copy-status">TAP TO COPY CODE</span>
                        <span class="code-value">${code}</span>
                    </div>
                `;
            } catch (error) {
                displayArea.innerHTML = `
                    <div style="color:#ff4444;">
                        <i class="fa fa-exclamation-triangle"></i><br>
                        <span style="font-size:0.8rem;">Server busy or offline. Try again.</span>
                    </div>
                `;
            }
        });

        // Trigger on Enter key
        numInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") submitBtn.click();
        });
    </script>
</body>
</html>
